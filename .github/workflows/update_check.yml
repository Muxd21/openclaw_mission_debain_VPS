name: Check for External Updates

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # 4 times a day
  workflow_dispatch: # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Latest Relases
        id: check
        run: |
          MC_VERSION=$(curl -s https://api.github.com/repos/builderz-labs/mission-control/releases/latest | jq -r .tag_name)
          OC_VERSION=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r .tag_name)
          
          # Just as an example, this can trigger a rebuild or notification
          echo "Mission Control Latest: $MC_VERSION"
          echo "OpenClaw Latest: $OC_VERSION"
          
          # NOTE: To trigger another workflow, you MUST use a Personal Access Token (PAT)
          # instead of the default GITHUB_TOKEN. Replace 'GH_PAT' with your secret name.
          echo "Triggering build-arm64 workflow..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-arm64.yml/dispatches \
            -d '{"ref":"main"}' || echo "Failed to trigger (Ensure GH_PAT is set)"
